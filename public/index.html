<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmobot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --text: #f0f0f0;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --text: #111111;
    }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
      overflow: hidden;
      position: relative;
    }

    #stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }



    .logo {
      font-size: clamp(2.5rem, 8vw, 6rem);
      letter-spacing: -0.02em;
      user-select: none;
      z-index: 1;
    }

    .logo-cosmo {
      font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
    }

    .logo-bot {
      font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 300;
    }

    .dot-link {
      color: inherit;
      text-decoration: none;
      cursor: default;
    }

    /* Theme toggle — icon only */
    .theme-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 10;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 1.4rem;
      padding: 0.3rem;
      transition: color 0.4s, opacity 0.2s;
      opacity: 0.8;
      line-height: 1;
    }

    .theme-toggle:hover { opacity: 1; }

    /* Contact link */
    .contact {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      z-index: 10;
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s, color 0.4s;
    }

    .contact:hover { opacity: 1; }
    .contact:hover .contact-text { text-decoration: underline; }

    /* Product section */
    .products {
      position: absolute;
      top: calc(50% + clamp(2.5rem, 5vw, 4rem));
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      align-items: center;
    }

    .product-link {
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.2s, color 0.4s;
      display: inline-block;
    }

    .product-link:hover { opacity: 1; }
    .product-link:hover .product-name { text-decoration: underline; }

    .product-tagline {
      opacity: 0.4;
      font-size: 0.7rem;
      margin-left: 0.3em;
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span id="toggleIcon">●</span>
  </button>

  <a class="contact" href="mailto:info@cosmobot.fr">[<span class="contact-text">contact us</span>]</a>

  <h1 class="logo">
    <span class="logo-cosmo">cosmo</span><span class="logo-bot">bot<a href="https://printer.cosmobot.fr" class="dot-link">.</a>fr</span>
  </h1>

  <div class="products">
    <a class="product-link" id="comptoirLink" href="https://comptoir.cosmobot.fr">[<span class="product-name">comptoir</span>]<span class="product-tagline"> — manage your restaurant team</span></a>
    <a class="product-link" id="bulkoLink" href="https://bulko.cosmobot.fr">[<span class="product-name">bulko</span>]<span class="product-tagline"> — audit your supplier spend</span></a>
  </div>

  <script>
    const html = document.documentElement;
    const iconEl = document.getElementById('toggleIcon');
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    // Theme — 2-state: light ↔ dark
    const ICONS = { light: '☾︎', dark: '☀︎' };

    function getSystemPref() {
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    let theme = localStorage.getItem('cosmobot-theme') || getSystemPref();

    function applyTheme() {
      html.setAttribute('data-theme', theme);
      iconEl.textContent = ICONS[theme];
      // Sync theme to product links
      const productLinks = [
        ['comptoirLink', 'https://comptoir.cosmobot.fr'],
        ['bulkoLink', 'https://bulko.cosmobot.fr'],
      ];
      for (const [id, baseUrl] of productLinks) {
        const link = document.getElementById(id);
        if (link) link.href = baseUrl + '?theme=' + theme;
      }
    }

    applyTheme();

    document.getElementById('themeToggle').addEventListener('click', () => {
      theme = theme === 'light' ? 'dark' : 'light';
      localStorage.setItem('cosmobot-theme', theme);
      applyTheme();
    });

    // Stars
    let w, h, stars = [], shootingStar = null, shootingTimer = 0;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      initStars();
    }

    function initStars() {
      stars = [];
      const count = Math.floor((w * h) / 2500);
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 0.7 + 0.2,
          baseAlpha: Math.random() * 0.05 + 0.02,
          phase: Math.random() * Math.PI * 2,
          speed: Math.random() * 1.2 + 0.3,
          amplitude: Math.random() * 0.95 + 0.4
        });
      }
    }

    function launchShootingStar() {
      const startX = Math.random() * w * 0.7;
      const startY = Math.random() * h * 0.3;
      const angle = Math.PI / 7 + Math.random() * Math.PI / 8;
      shootingStar = {
        x: startX,
        y: startY,
        angle: angle,
        speed: 7 + Math.random() * 3,
        life: 1,
        length: 140 + Math.random() * 80,
        maxAlpha: 0.3 + Math.random() * 0.2
      };
    }

    // --- Constellation hover animation (shared engine) ---
    const CONSTELLATION_SPEED_IN = 1.8;
    const CONSTELLATION_SPEED_OUT = 1;
    const CONSTELLATION_MAX_ALPHA = 1;

    function makeConstellation(ratios, edges, triggerEl) {
      const state = { progress: 0, target: 0 };
      triggerEl.addEventListener('mouseenter', () => { state.target = 1; });
      triggerEl.addEventListener('mouseleave', () => { state.target = 0; });
      return { ratios, edges, state };
    }

    // Comptoir — short Scorpius, upper area
    const comptoirConstellation = makeConstellation(
      [
        { x: 0.36, y: 0.20 }, // 0  head left
        { x: 0.40, y: 0.18 }, // 1  head right
        { x: 0.38, y: 0.15 }, // 2  head top (claw)
        { x: 0.44, y: 0.22 }, // 3  body
        { x: 0.49, y: 0.25 }, // 4  stinger
      ],
      [
        [2, 0], [2, 1], [0, 1], // head/claws
        [1, 3], [3, 4],         // body + stinger
      ],
      document.getElementById('comptoirLink')
    );

    // Bulko — basket-like arc, lower-left area
    const bulkoConstellation = makeConstellation(
      [
        { x: 0.18, y: 0.62 }, // 0 handle left
        { x: 0.24, y: 0.56 }, // 1 handle top
        { x: 0.30, y: 0.62 }, // 2 handle right
        { x: 0.20, y: 0.69 }, // 3 basket left
        { x: 0.26, y: 0.73 }, // 4 basket bottom
        { x: 0.32, y: 0.69 }, // 5 basket right
      ],
      [
        [0, 1], [1, 2],       // handle
        [0, 3], [3, 4], [4, 5], [5, 2], // basket
        [3, 5],               // rim
      ],
      document.getElementById('bulkoLink')
    );

    // Contact — Cassiopeia-like W, lower-right area
    const contactConstellation = makeConstellation(
      [
        { x: 0.62, y: 0.72 }, { x: 0.67, y: 0.65 }, { x: 0.72, y: 0.74 },
        { x: 0.77, y: 0.66 }, { x: 0.82, y: 0.73 }, { x: 0.85, y: 0.68 },
        { x: 0.74, y: 0.60 }, { x: 0.69, y: 0.78 },
      ],
      [
        [0, 1], [1, 2], [2, 3], [3, 4],
        [4, 5], [1, 6], [6, 3], [2, 7],
      ],
      document.querySelector('.contact')
    );

    const constellations = [comptoirConstellation, bulkoConstellation, contactConstellation];

    function drawConstellations(dt) {
      const c = starColor();

      for (const { ratios, edges, state } of constellations) {
        if (state.target === 1 && state.progress < 1) {
          state.progress = Math.min(1, state.progress + dt / CONSTELLATION_SPEED_IN);
        } else if (state.target === 0 && state.progress > 0) {
          state.progress = Math.max(0, state.progress - dt / CONSTELLATION_SPEED_OUT);
        }

        if (state.progress <= 0) continue;

        const pts = ratios.map(p => ({ x: p.x * w, y: p.y * h }));
        const totalEdges = edges.length;

        for (let i = 0; i < totalEdges; i++) {
          const edgeStart = i / totalEdges;
          const edgeEnd = (i + 1) / totalEdges;
          const edgeProgress = Math.max(0, Math.min(1, (state.progress - edgeStart) / (edgeEnd - edgeStart)));
          if (edgeProgress <= 0) continue;

          const [a, b] = edges[i];
          const from = pts[a], to = pts[b];
          const toX = from.x + (to.x - from.x) * edgeProgress;
          const toY = from.y + (to.y - from.y) * edgeProgress;
          const alpha = state.progress * CONSTELLATION_MAX_ALPHA;

          ctx.beginPath();
          ctx.moveTo(from.x, from.y);
          ctx.lineTo(toX, toY);
          ctx.strokeStyle = `rgba(${c}, ${alpha})`;
          ctx.lineWidth = 0.1;
          ctx.stroke();

          if (edgeProgress > 0) {
            ctx.beginPath();
            ctx.arc(from.x, from.y, 0.7, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${c}, ${alpha * 1.0})`;
            ctx.fill();
          }
          if (edgeProgress >= 1) {
            ctx.beginPath();
            ctx.arc(to.x, to.y, 0.7, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${c}, ${alpha * 1.0})`;
            ctx.fill();
          }
        }
      }
    }

    let lastTime = 0;
    function starColor() {
      return html.getAttribute('data-theme') === 'light' ? '0, 0, 0' : '255, 255, 255';
    }

    function draw(time) {
      const dt = (time - lastTime) / 1000;
      lastTime = time;
      ctx.clearRect(0, 0, w, h);
      const c = starColor();

      // Twinkling stars
      const isLight = html.getAttribute('data-theme') === 'light';
      for (const s of stars) {
        s.phase += s.speed * dt;
        const twinkle = (Math.sin(s.phase) + 1) / 2;
        const alpha = s.baseAlpha + s.amplitude * twinkle;
        const a = isLight ? Math.min(alpha * 1.2, 0.40) : alpha;
        const r = isLight ? s.r * 1.2 : s.r;
        ctx.beginPath();
        ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${c}, ${a})`;
        ctx.fill();
      }

      // Shooting star
      shootingTimer += dt;
      const shootInterval = shootingStar === null && lastTime < 3000 ? 1 : 6 + Math.random() * 6;
      if (shootingTimer > shootInterval && !shootingStar) {
        launchShootingStar();
        shootingTimer = 0;
      }

      if (shootingStar) {
        const ss = shootingStar;
        ss.x += Math.cos(ss.angle) * ss.speed;
        ss.y += Math.sin(ss.angle) * ss.speed;
        ss.life -= dt * 0.4;

        if (ss.life > 0 && ss.x < w + 100 && ss.y < h + 100) {
          const tailX = ss.x - Math.cos(ss.angle) * ss.length * ss.life;
          const tailY = ss.y - Math.sin(ss.angle) * ss.length * ss.life;

          const a = ss.life * (isLight ? ss.maxAlpha * 0.5 : ss.maxAlpha);
          const grad = ctx.createLinearGradient(tailX, tailY, ss.x, ss.y);
          grad.addColorStop(0, `rgba(${c}, 0)`);
          grad.addColorStop(0.8, `rgba(${c}, ${a * 0.3})`);
          grad.addColorStop(1, `rgba(${c}, ${a})`);

          ctx.beginPath();
          ctx.moveTo(tailX, tailY);
          ctx.lineTo(ss.x, ss.y);
          ctx.strokeStyle = grad;
          ctx.lineWidth = 0.7;
          ctx.stroke();

          // Head — small like a star
          ctx.beginPath();
          ctx.arc(ss.x, ss.y, 0.7, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${c}, ${a * 1.2})`;
          ctx.fill();
        } else {
          shootingStar = null;
        }
      }

      // Constellation overlays
      drawConstellations(dt);

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
